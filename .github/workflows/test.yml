name: Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.10'
          cache-dependency-path: server/go.sum

      - name: Run go vet
        working-directory: server
        run: go vet ./...

      - name: Run tests
        working-directory: server
        run: go test -short -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: server/coverage.out
          if-no-files-found: warn
          retention-days: 14

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.10'
          cache-dependency-path: server/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: 'v2.11.4'
          working-directory: server
          args: --timeout=5m
        continue-on-error: false

  integration-test:
    runs-on: ubuntu-latest
    continue-on-error: false
    services:
      redis:
        image: valkey/valkey:8-alpine
        ports:
          - 56379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: ghcr.io/scitrera/rabbitmq-stream:4-management
        ports:
          - 55552:5552
          - 55672:5672
        env:
          # Force RabbitMQ Streams to advertise an address the test client
          # (running on the runner host, not inside the docker network) can
          # actually reach. Without this, the broker hands clients its
          # Docker-generated container hostname (e.g. b58b5094e4dc) in the
          # Metadata response; the runner's resolver returns NXDOMAIN and
          # all producer/consumer connection attempts fail with
          # `lookup <hostname> on 127.0.0.53:53: server misbehaving`.
          #
          # RABBITMQ_STREAM_ADVERTISED_HOST / _PORT are NOT recognized env
          # vars — the stream-plugin's nested config keys
          # (`stream.advertised_host`, `stream.advertised_port`) don't have
          # env-var auto-mappings in the official RabbitMQ image. Setting
          # them does nothing, which is what caused the silent failure.
          #
          # RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS IS honored: the entrypoint
          # forwards it to the Erlang VM, which applies the values directly
          # to the rabbitmq_stream application before plugin start. This is
          # the GHA-compatible equivalent of the rabbitmq.conf snippet used
          # by server/scripts/run_proxy_load_test.sh and
          # server/deployments/docker-compose/nginx/rabbitmq.conf.
          RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: '-rabbitmq_stream advertised_host "127.0.0.1" -rabbitmq_stream advertised_port 55552'
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 10

      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: aether
          POSTGRES_PASSWORD: aether_test
          POSTGRES_DB: aether
        options: >-
          --health-cmd "pg_isready -U aether"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      REDIS_ADDR: localhost:56379
      RABBITMQ_STREAM_URL: rabbitmq-stream://guest:guest@localhost:55552
      RABBITMQ_AMQP_URL: amqp://guest:guest@localhost:55672/
      POSTGRES_DSN: postgres://aether:aether_test@localhost:5432/aether?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.10'
          cache-dependency-path: server/go.sum

      - name: Run integration tests
        working-directory: server
        run: go test -race -count=1 -tags=integration ./...

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.10'
          cache-dependency-path: server/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck
        working-directory: server
        run: govulncheck ./...

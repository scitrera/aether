name: Version Check

on:
  pull_request:
    paths:
      - 'versions.yaml'
      - 'sdk/python-client/pyproject.toml'
      - 'sdk/python-client/scitrera_aether_client/__init__.py'
      - 'sdk/typescript/package.json'
      - 'server/internal/version/version.go'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Check version consistency
        run: python scripts/update-versions.py --check --verbose

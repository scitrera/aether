# Aether ACL Model for Casbin
#
# This model defines the policy structure for Aether's access control system.
# Evaluation is performed by application code using GetFilteredPolicy() to
# preserve Aether's specificity-priority semantics (exact match > wildcard).
# The matcher here is a placeholder required by Casbin initialization.
#
# Policy format: p = sub, obj, act, expires, rule_id
#   sub:     "{principal_type}:{principal_id}" e.g. "user:alice", "wildcard:_any_agent"
#   obj:     "{resource_type}:{resource_id}"   e.g. "workspace:production", "kv_scope:global"
#   act:     access level as string            e.g. "10", "20", "30"
#   expires: RFC3339 timestamp or ""           e.g. "2026-12-31T00:00:00Z"
#   rule_id: UUID of the acl_rules row         e.g. "550e8400-e29b..."

[request_definition]
r = sub, obj, act

[policy_definition]
p = sub, obj, act, expires, rule_id

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
m = r.sub == p.sub && r.obj == p.obj

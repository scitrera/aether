# DEVELOPMENT/TESTING ONLY — single-node AetherLite with cluster mode enabled.
#
# AetherLite Cluster — Topology A (single-node, R=1)
# =====================================================
# One aetherlite node running in cluster mode with an embedded NATS/JetStream
# server, backed by MinIO for S3-compatible snapshot storage.
#
# What's included:
#   aetherlite   — single-node AetherLite (cluster mode, no peers)
#   minio        — S3-compatible object storage for JetStream backups
#   minio-init   — one-shot bucket creation (exits after setup)
#   netshoot     — optional network-debug sidecar (sleep infinity)
#
# Required environment variables: none (all have sensible defaults).
# Optional overrides:
#   AETHERLITE_IMAGE      — Docker image tag (default: scitrera/aether-gateway:latest)
#   AETHERLITE_DATA_DIR   — data directory inside the container (default: /data/aetherlite)
#   MINIO_ROOT_USER       — MinIO root user (default: minioadmin)
#   MINIO_ROOT_PASSWORD   — MinIO root password (default: minioadmin)
#
# Usage:
#   docker compose -f server/deployments/docker-compose/cluster-single.yaml up
#   docker compose -f server/deployments/docker-compose/cluster-single.yaml down
#   docker compose -f server/deployments/docker-compose/cluster-single.yaml down -v  # removes volumes

services:
  # ===========================================================================
  # MinIO — S3-compatible backup store
  # ===========================================================================
  minio:
    image: minio/minio:latest
    container_name: aetherlite-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO console UI
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - aetherlite

  # One-shot service: create the aetherlite-backups bucket then exit.
  # Depends on minio being healthy before it runs.
  minio-init:
    image: minio/minio:latest
    container_name: aetherlite-minio-init
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin} &&
        mc mb --ignore-existing local/aetherlite-backups &&
        echo 'Bucket aetherlite-backups ready.'
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - aetherlite
    restart: "no"

  # ===========================================================================
  # AetherLite — single-node cluster mode
  # ===========================================================================
  aetherlite:
    image: ${AETHERLITE_IMAGE:-scitrera/aether-gateway:latest}
    container_name: aetherlite
    entrypoint: ["aetherlite"]
    environment:
      # Core
      AETHERLITE_DATA_DIR: ${AETHERLITE_DATA_DIR:-/data/aetherlite}
      AETHERLITE_PORT: "50051"
      AETHERLITE_ADMIN_PORT: "31880"
      AETHERLITE_DEV: "true"
      AETHERLITE_INSECURE_ADMIN: "true"
      AETHER_ALLOW_DEV_MODE: "true"

      # Cluster mode — single node, no peers
      AETHERLITE_CLUSTER_MODE: "true"
      AETHERLITE_CLUSTER_PEERS: ""
      AETHERLITE_HA_MODE: "auto"
      AETHERLITE_NATS_CLUSTER_PORT: "6222"

      # S3 backup — MinIO
      AETHERLITE_S3_BUCKET: aetherlite-backups
      AETHERLITE_S3_ENDPOINT: http://minio:9000
      AETHERLITE_S3_REGION: us-east-1
      AETHERLITE_S3_PREFIX: "aetherlite/"
      AETHERLITE_S3_FORCE_PATH_STYLE: "true"
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}

      # Dispatcher — JetStream in cluster mode
      AETHER_DISPATCHER: jetstream

      # Logging
      OBSERVABILITY_LOG_LEVEL: info
    ports:
      - "50051:50051"   # gRPC
      - "31880:31880"   # Admin UI
    volumes:
      - aetherlite-data:/data/aetherlite
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:31880/health/live"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s
    networks:
      - aetherlite
    restart: unless-stopped

  # ===========================================================================
  # netshoot — network debug sidecar (optional, chaos/packet-sniff testing)
  # ===========================================================================
  netshoot:
    image: nicolaka/netshoot
    container_name: aetherlite-netshoot
    command: sleep infinity
    networks:
      - aetherlite
    profiles:
      - debug

# =============================================================================
# Volumes
# =============================================================================
volumes:
  aetherlite-data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  aetherlite:
    driver: bridge

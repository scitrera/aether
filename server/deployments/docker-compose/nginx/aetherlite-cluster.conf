# Nginx Load Balancer Configuration for AetherLite Full Cluster (3-node)
# gRPC load balancing with ip_hash sticky sessions
#
# Topology C: 3-node quorum, R=3
# - Sticky sessions via ip_hash keep clients on the same node
# - Any node can serve reads/writes (JetStream R=3 quorum)
# - Loss of one node is transparent to connected clients

events {
    worker_connections 1024;
}

http {
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    upstream aetherlite_grpc {
        ip_hash;

        server aetherlite-1:50051 max_fails=3 fail_timeout=30s;
        server aetherlite-2:50051 max_fails=3 fail_timeout=30s;
        server aetherlite-3:50051 max_fails=3 fail_timeout=30s;

        keepalive 32;
        keepalive_requests 100;
        keepalive_timeout 60s;
    }

    upstream aetherlite_admin {
        server aetherlite-1:31880;
        server aetherlite-2:31880;
        server aetherlite-3:31880;
    }

    server {
        listen 50050 http2;
        server_name _;

        grpc_read_timeout 3600s;
        grpc_send_timeout 3600s;
        client_body_timeout 3600s;
        client_max_body_size 100M;

        location / {
            grpc_pass grpc://aetherlite_grpc;

            grpc_set_header Host $host;
            grpc_set_header X-Real-IP $remote_addr;
            grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            grpc_set_header X-Forwarded-Proto $scheme;

            grpc_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        }
    }

    server {
        listen 8080;
        server_name _;

        location /health {
            access_log off;
            return 200 "nginx (aetherlite-cluster) healthy\n";
            add_header Content-Type text/plain;
        }

        location /health/live {
            proxy_pass http://aetherlite_admin/health/live;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /health/ready {
            proxy_pass http://aetherlite_admin/health/ready;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /nginx_status {
            stub_status on;
            access_log off;
        }
    }
}

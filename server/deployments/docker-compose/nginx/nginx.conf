# Nginx Load Balancer Configuration
# gRPC load balancing with session affinity for Aether Gateway
#
# Features:
# - gRPC protocol support (HTTP/2)
# - Session affinity using IP hash (consistent routing)
# - Health checks on backend gateways
# - Load balancing across 3 gateway instances

events {
    worker_connections 1024;
}

http {
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # gRPC upstream - 3 gateway instances
    upstream aether_gateways {
        # Session affinity: same client IP always routes to same gateway
        # This improves performance by reducing reconnection churn
        ip_hash;

        # Gateway instances
        server gateway-1:50051 max_fails=3 fail_timeout=30s;
        server gateway-2:50051 max_fails=3 fail_timeout=30s;
        server gateway-3:50051 max_fails=3 fail_timeout=30s;

        # Keepalive connections to backends
        keepalive 32;
        keepalive_requests 100;
        keepalive_timeout 60s;
    }

    # Health check upstream (HTTP endpoints)
    upstream aether_health {
        server gateway-1:8080;
        server gateway-2:8080;
        server gateway-3:8080;
    }

    # gRPC server block
    server {
        listen 50050 http2;
        server_name _;

        # gRPC settings
        grpc_read_timeout 3600s;
        grpc_send_timeout 3600s;
        client_body_timeout 3600s;

        # Maximum message size (100MB for large protobuf messages)
        client_max_body_size 100M;

        # gRPC proxy to upstream
        location / {
            grpc_pass grpc://aether_gateways;

            # Headers
            grpc_set_header Host $host;
            grpc_set_header X-Real-IP $remote_addr;
            grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            grpc_set_header X-Forwarded-Proto $scheme;

            # Error handling
            grpc_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        }
    }

    # HTTP health check endpoint
    server {
        listen 8080;
        server_name _;

        # Load balancer health check
        location /health {
            access_log off;
            return 200 "nginx load balancer healthy\n";
            add_header Content-Type text/plain;
        }

        # Proxy health checks to backends
        location /health/live {
            proxy_pass http://aether_health/health/live;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /health/ready {
            proxy_pass http://aether_health/health/ready;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Status page (optional)
        location /nginx_status {
            stub_status on;
            access_log off;
        }
    }
}

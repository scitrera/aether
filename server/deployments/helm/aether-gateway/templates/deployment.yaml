{{- include "aether-gateway.validateSecrets" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aether-gateway.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aether-gateway.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      {{- include "aether-gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Trigger rolling restart when the ConfigMap content changes
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "aether-gateway.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "aether-gateway.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      containers:
        - name: gateway
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: grpc
              containerPort: {{ .Values.ports.grpc }}
              protocol: TCP
            - name: admin
              containerPort: {{ .Values.ports.admin }}
              protocol: TCP
            - name: ops
              containerPort: {{ .Values.ports.ops }}
              protocol: TCP
          env:
            # Unique gateway ID derived from the pod name via Downward API
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: AETHER_GATEWAY_GATEWAY_ID
              value: "gateway-$(POD_NAME)"
            # Pod metadata for logging
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            # Credentials from Secret
            - name: AETHER_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "aether-gateway.secretName" . }}
                  key: postgres-password
            - name: AETHER_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "aether-gateway.secretName" . }}
                  key: redis-password
                  optional: true
            - name: AETHER_ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "aether-gateway.secretName" . }}
                  key: admin-api-key
                  optional: true
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/aether/config
              readOnly: true
            - name: tls
              mountPath: /etc/aether/tls
              readOnly: true
            - name: tmp
              mountPath: /tmp
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          args:
            - --config
            - /etc/aether/config/config.yaml
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "aether-gateway.configMapName" . }}
        - name: tls
          secret:
            {{- if .Values.tls.existingSecret }}
            secretName: {{ .Values.tls.existingSecret }}
            {{- else }}
            secretName: {{ include "aether-gateway.fullname" . }}-tls
            {{- end }}
            optional: true
        # Writable /tmp required when readOnlyRootFilesystem is true
        - name: tmp
          emptyDir: {}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- if and (not .Values.affinity) .Values.defaultPodAntiAffinity }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "aether-gateway.selectorLabels" . | nindent 20 }}
                topologyKey: kubernetes.io/hostname
      {{- else if .Values.affinity }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

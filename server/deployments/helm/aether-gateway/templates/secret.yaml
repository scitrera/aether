{{- if .Values.secrets.create -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aether-gateway.fullname" . }}-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aether-gateway.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  postgres-password: {{ .Values.secrets.postgresPassword | quote }}
  redis-password: {{ .Values.secrets.redisPassword | quote }}
  admin-api-key: {{ .Values.secrets.adminApiKey | quote }}
{{- end }}

# Aether Gateway Deployment
# Phase 1: Kubernetes Horizontal Scaling
# Multiple gateway instances with unique IDs and session affinity

# -----------------------------------------------------------------------------
# Deployment: Aether Gateway
# Runs 3 replicas of the gateway for high availability and horizontal scaling
# Each pod gets a unique gateway ID via Kubernetes downward API
# -----------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aether-gateway
  namespace: aether
  labels:
    app: aether-gateway
    component: gateway
    version: v0.1.0
spec:
  # Run 3 replicas for high availability
  replicas: 3

  # Rolling update strategy to minimize downtime
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1

  selector:
    matchLabels:
      app: aether-gateway
      component: gateway

  template:
    metadata:
      labels:
        app: aether-gateway
        component: gateway
        version: v0.1.0
      annotations:
        # Restart pods when ConfigMap changes
        checksum/config: "{{ include (print $.Template.BasePath \"/configmap.yaml\") . | sha256sum }}"

    spec:
      # Service account for RBAC
      serviceAccountName: aether-gateway

      # Security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      containers:
      - name: gateway
        image: scitrera/aether-gateway:latest
        imagePullPolicy: IfNotPresent

        # Ports
        ports:
        - name: grpc
          containerPort: 50051
          protocol: TCP
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: prometheus
          containerPort: 9090
          protocol: TCP

        # Environment variables from ConfigMap
        envFrom:
        - configMapRef:
            name: aether-gateway-config

        # Additional environment variables
        env:
        # Unique gateway ID using pod name via downward API
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: AETHER_GATEWAY_ID
          value: "gateway-$(POD_NAME)"

        # Pod metadata for logging/debugging
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP

        # Secrets (passwords, credentials)
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: aether-postgres-secret
              key: password
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: aether-redis-secret
              key: password
              optional: true

        # Resource limits and requests
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 2000m
            memory: 2Gi

        # Liveness probe - restart if gateway is unhealthy
        livenessProbe:
          httpGet:
            path: /health/live
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        # Readiness probe - remove from service if not ready
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

        # Startup probe - allow extra time for initialization
        startupProbe:
          httpGet:
            path: /health/startup
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 12  # 60 seconds total

        # Volume mounts
        volumeMounts:
        # mTLS certificates (if enabled)
        - name: gateway-tls
          mountPath: /etc/aether/tls
          readOnly: true

        # Config file (alternative to envFrom)
        - name: config-volume
          mountPath: /etc/aether/config
          readOnly: true

      # Volumes
      volumes:
      # TLS certificates from cert-manager
      - name: gateway-tls
        secret:
          secretName: aether-gateway-tls
          optional: true

      # Config file from ConfigMap
      - name: config-volume
        configMap:
          name: aether-gateway-config-file
          optional: true

      # Pod anti-affinity to spread replicas across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: aether-gateway
                  component: gateway
              topologyKey: kubernetes.io/hostname

      # Termination grace period for clean shutdown
      terminationGracePeriodSeconds: 30

---
# -----------------------------------------------------------------------------
# ServiceAccount: Aether Gateway
# RBAC service account for gateway pods
# -----------------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aether-gateway
  namespace: aether
  labels:
    app: aether-gateway
    component: gateway

---
# -----------------------------------------------------------------------------
# Secret: Postgres Password
# Placeholder - should be created separately with actual credentials
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: aether-postgres-secret
  namespace: aether
  labels:
    app: aether-gateway
    component: database
type: Opaque
data:
  # Base64 encoded password (default: "aether")
  # In production, use external secret management (e.g., Sealed Secrets, Vault)
  password: YWV0aGVy

---
# -----------------------------------------------------------------------------
# Secret: Redis Password (optional)
# Placeholder - should be created separately if Redis requires authentication
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: aether-redis-secret
  namespace: aether
  labels:
    app: aether-gateway
    component: cache
type: Opaque
data:
  # Base64 encoded password (empty by default for dev)
  # In production, use external secret management
  password: ""

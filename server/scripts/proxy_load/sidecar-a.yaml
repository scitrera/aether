# Sidecar A — terminator registered as sv::echo::a, fronts a TCP echo backend
# for tunnel traffic and an HTTP echo backend for REST traffic. Used by the
# wire-level proxy load test (server/cmd/loadtest/proxy).

gateway:
  address: localhost:50051
  insecure: true

service:
  implementation: echo
  specifier: a

tenant_id: loadtest

terminator:
  enabled: true
  backends:
    - name: http
      kind: http
      url: http://127.0.0.1:62001
      allow_paths:
        - "/*"
      allow_methods:
        - GET
        - POST
        - PUT
        - DELETE
      max_body_bytes: 4194304
      idle_timeout_ms: 30000
      header_mode: passthrough

    - name: tcp
      kind: tcp
      url: 127.0.0.1:62101
      allow_remote_hints:
        - "*"
      max_bytes: 104857600
      idle_timeout_ms: 60000

logging:
  level: info
  format: json

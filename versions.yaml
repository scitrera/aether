# Authoritative Versions for all packages
# scripts/update-versions.py can check all versions against this file and update all package to be in sync
#
# Go modules are released in lockstep: `aether-gateway` (server/), `aether-sdk-go` (sdk/go/),
# and the implicit `aether-api` (api/) module all share the same version tag. This is required
# because server/go.mod and sdk/go/go.mod both `require github.com/scitrera/aether/api` at the
# same version, and server/go.mod additionally requires `github.com/scitrera/aether/sdk/go`.
# The `replace` directives in each go.mod handle local builds; the `require` pins handle
# downstream `go get` from pkg.go.dev. update-versions.py keeps the require pins in sync.

aether-gateway: 0.1.60

aether-sdk-go: 0.1.60 # github.com/scitrera/aether/sdk/go (also drives github.com/scitrera/aether/api require pins)
aether-sdk-python: 0.1.60  # scitrera-aether-client
aether-sdk-typescript: 0.1.60  # @scitrera/aether-client
